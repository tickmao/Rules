# @ConfigName      Tickmao自用的Surge配置文件
# @Author          Tickmao
# @Feedback        lyle.lypm@gmail.com
# @UpdateTime      ⏱2026/06/25 15:50 UTC/GMT +8
# @Function        注释行默认不生效，去掉开头注释符后生效
