[Rule]
# Direct Fix
RULE-SET,https://raw.githubusercontent.com/tickmao/Rules/master/Surge/Rules/Direct.list,Mainland
# 强制禁用 QUIC 协议，提升 YouTube 等谷歌系服务的播放体验
AND,((PROTOCOL,UDP), (DEST-PORT,443)),REJECT-NO-DROP
# Reject Ads
RULE-SET,https://raw.githubusercontent.com/tickmao/Rules/master/Surge/Rules/Ads_SukkaW.list,REJECT #!MACOS-ONLY
RULE-SET,https://raw.githubusercontent.com/tickmao/Rules/master/Surge/Rules/Reject.list,REJECT
