Japan = select,policy-regex-filter=(?=.*(日|🇯🇵|东京|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$
Hong Kong = select,policy-regex-filter=(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|美)).)*$
